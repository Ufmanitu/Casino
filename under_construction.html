<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Game Under Construction</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at top, #1a0033, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        text-align: center;
    }

    .box {
        padding: 50px 60px;
        border-radius: 25px;
        background: rgba(255,255,255,0.05);
        box-shadow: 0 0 40px rgba(255, 0, 200, 0.6);
        animation: float 3s ease-in-out infinite;
    }

    h1 {
        font-size: 36px;
        color: gold;
        text-shadow: 0 0 20px gold;
    }

    p {
        opacity: 0.85;
        margin-top: 10px;
    }

    .icon {
        font-size: 60px;
        margin-bottom: 20px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 0.6; }
    }

    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
        100% { transform: translateY(0); }
    }

    a {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 25px;
        border-radius: 30px;
        text-decoration: none;
        color: black;
        background: gold;
        font-weight: bold;
        transition: transform 0.2s;
    }

    a:hover {
        transform: scale(1.1);
    }
</style>
</head>
<body>

<div class="box">
    <div class="icon">🚧</div>
    <h1>Game Under Construction</h1>
    <p>This game is currently being built.<br>
       Check back soon!</p>
    <a href="index.html">Back to Casino</a>
</div>

</body>
</html>
