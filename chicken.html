<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Chicken Road – Let It Ride Casino</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f1923;
            color: #c8d6e0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ── LEFT PANEL ── */
        #panel {
            width: 220px;
            min-width: 220px;
            background: #1a2530;
            border-right: 1px solid #243040;
            display: flex;
            flex-direction: column;
            padding: 16px 14px;
            gap: 14px;
        }

        .panel-label {
            font-size: 11px;
            color: #5a7080;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .amount-row {
            display: flex;
            align-items: center;
            background: #111d27;
            border: 1px solid #243040;
            border-radius: 6px;
            overflow: hidden;
        }

        .amount-row input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e0eaf0;
            font-size: 14px;
            padding: 9px 10px;
            outline: none;
            width: 0;
        }

        .coin-icon {
            padding: 0 8px;
            font-size: 16px;
        }

        .amount-btns {
            display: flex;
            border-left: 1px solid #243040;
        }

        .amount-btns button {
            background: #1e2d3a;
            border: none;
            color: #7a9ab0;
            padding: 0 10px;
            height: 36px;
            cursor: pointer;
            font-size: 12px;
            transition: background .15s;
        }

        .amount-btns button:hover { background: #263545; }
        .amount-btns button:not(:last-child) { border-right: 1px solid #243040; }

        select {
            width: 100%;
            background: #111d27;
            border: 1px solid #243040;
            border-radius: 6px;
            color: #e0eaf0;
            padding: 9px 10px;
            font-size: 13px;
            outline: none;
            appearance: none;
            cursor: pointer;
        }

        .select-wrap {
            position: relative;
        }

        .select-wrap::after {
            content: '▾';
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a7080;
            pointer-events: none;
        }

        #btn-play {
            width: 100%;
            padding: 12px;
            background: #4caf50;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .5px;
            transition: background .15s, transform .1s;
        }

        #btn-play:hover { background: #5dbf61; }
        #btn-play:active { transform: scale(.97); }
        #btn-play:disabled { background: #2a3d2a; color: #4a7a4a; cursor: default; }

        #btn-cashout {
            width: 100%;
            padding: 12px;
            background: #e6a817;
            border: none;
            border-radius: 6px;
            color: #111;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .5px;
            transition: background .15s, transform .1s;
            display: none;
        }

        #btn-cashout:hover { background: #f0b820; }
        #btn-cashout:active { transform: scale(.97); }

        .net-gain-box {
            background: #111d27;
            border: 1px solid #243040;
            border-radius: 6px;
            padding: 9px 10px;
            font-size: 14px;
            color: #e0eaf0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .net-gain-box .coin-icon { padding: 0; }

        /* ── GAME AREA ── */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #road {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #141f2a;
        }

        /* road lanes / ground */
        #road-bg {
            position: absolute;
            inset: 0;
        }

        /* multiplier tiles row */
        #tiles-row {
            position: absolute;
            bottom: 0;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
        }

        .lane {
            flex: 1;
            height: 100%;
            border-right: 1px solid #1e2d3a;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lane:last-child { border-right: none; }

        /* Pot / frying pan tile */
        .pot {
            width: 80px;
            height: 80px;
            position: relative;
            cursor: pointer;
            transition: transform .2s;
        }

        .pot:hover .pot-lid { transform: translateY(-8px) rotate(-5deg); }

        .pot-body {
            width: 80px;
            height: 60px;
            background: radial-gradient(circle at 35% 35%, #5a6a75, #2e3e4a);
            border-radius: 8px 8px 14px 14px;
            position: absolute;
            bottom: 0;
            box-shadow: 0 4px 16px rgba(0,0,0,.6);
            border: 2px solid #3d5060;
        }

        .pot-handle-l, .pot-handle-r {
            width: 16px;
            height: 24px;
            background: #2e3e4a;
            border: 2px solid #3d5060;
            border-radius: 4px;
            position: absolute;
            bottom: 14px;
        }

        .pot-handle-l { left: -14px; }
        .pot-handle-r { right: -14px; }

        .pot-lid {
            width: 84px;
            height: 18px;
            background: radial-gradient(circle at 40% 30%, #6a7a85, #2e3e4a);
            border-radius: 50% 50% 8px 8px / 60% 60% 20% 20%;
            position: absolute;
            bottom: 52px;
            left: -2px;
            border: 2px solid #3d5060;
            transition: transform .2s;
            box-shadow: 0 -2px 8px rgba(0,0,0,.4);
        }

        .pot-knob {
            width: 10px;
            height: 10px;
            background: #8a9aa5;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            left: 37px;
        }

        /* steam bubbles */
        .steam {
            position: absolute;
            bottom: 56px;
            display: flex;
            gap: 6px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
        }

        .lane.revealed-safe .steam { animation: steamRise 1.5s ease-out forwards; }

        @keyframes steamRise {
            0%  { opacity: 0; transform: translateX(-50%) translateY(0); }
            30% { opacity: .7; }
            100%{ opacity: 0; transform: translateX(-50%) translateY(-40px); }
        }

        .steam span {
            width: 8px;
            height: 8px;
            background: rgba(200,220,240,.5);
            border-radius: 50%;
        }

        /* multiplier label */
        .mult-label {
            font-size: 13px;
            font-weight: 700;
            color: #7a9ab0;
            margin-top: 96px;
            letter-spacing: .5px;
        }

        /* fire/danger reveal */
        .lane.revealed-danger .pot-body {
            background: radial-gradient(circle at 35% 35%, #c0402a, #7a1a0a);
            border-color: #e05030;
            animation: shake .3s ease;
        }

        .lane.revealed-danger .pot-lid {
            background: radial-gradient(circle at 40% 30%, #c0402a, #7a1a0a);
            border-color: #e05030;
        }

        .flame {
            position: absolute;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            animation: flameAnim .5s ease-out;
            opacity: 0;
        }

        .lane.revealed-danger .flame { opacity: 1; }

        @keyframes flameAnim {
            0%  { transform: translateX(-50%) scale(.5); opacity: 1; }
            100%{ transform: translateX(-50%) scale(1.4) translateY(-20px); opacity: 0; }
        }

        @keyframes shake {
            0%,100%{ transform: translateX(0); }
            25%{ transform: translateX(-6px); }
            75%{ transform: translateX(6px); }
        }

        /* chicken sprite */
        #chicken {
            position: absolute;
            width: 56px;
            height: 56px;
            transition: left .35s cubic-bezier(.4,0,.2,1), bottom .15s;
            z-index: 10;
            pointer-events: none;
        }

        .chicken-svg { width: 100%; height: 100%; }

        /* chicken walk animation */
        #chicken.walking { animation: chickenBob .3s ease-in-out 2; }

        @keyframes chickenBob {
            0%,100%{ transform: translateY(0) rotate(0deg); }
            50%{ transform: translateY(-8px) rotate(3deg); }
        }

        #chicken.squish { animation: squish .3s ease-out; }

        @keyframes squish {
            0%{ transform: scaleX(1) scaleY(1); }
            40%{ transform: scaleX(1.5) scaleY(.5); }
            100%{ transform: scaleX(1) scaleY(1); }
        }

        /* ground strip */
        #ground {
            height: 32px;
            background: #1a2b1a;
            border-top: 2px solid #2a4a2a;
            position: relative;
        }

        .ground-line {
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            height: 2px;
            background: repeating-linear-gradient(90deg, #3a7a3a 0, #3a7a3a 20px, transparent 20px, transparent 40px);
        }

        /* top bar */
        #topbar {
            height: 44px;
            background: #131e28;
            border-bottom: 1px solid #1e2d3a;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 14px;
        }

        .topbar-logo {
            font-size: 15px;
            font-weight: 700;
            color: #e6a817;
            letter-spacing: 1px;
        }

        .topbar-back {
            margin-left: auto;
            background: #1e2d3a;
            border: 1px solid #2a3d50;
            border-radius: 5px;
            color: #7a9ab0;
            font-size: 12px;
            padding: 5px 12px;
            cursor: pointer;
            text-decoration: none;
            transition: background .15s;
        }

        .topbar-back:hover { background: #253848; }

        /* ── multiplier history bar at top of road ── */
        #mult-history {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 5;
        }

        .hist-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            background: #1e2d3a;
            color: #7a9ab0;
        }

        .hist-badge.win { background: #143020; color: #4caf50; }
        .hist-badge.loss { background: #2a1010; color: #e05030; }

        /* message overlay */
        #msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            text-align: center;
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity .3s;
        }

        #msg.show { opacity: 1; }

        #msg .msg-main {
            font-size: 36px;
            font-weight: 800;
            text-shadow: 0 2px 20px rgba(0,0,0,.8);
        }

        #msg .msg-sub {
            font-size: 14px;
            margin-top: 4px;
            color: #7a9ab0;
        }

        /* progress bar for current multiplier */
        #progress-bar {
            height: 4px;
            background: #1e2d3a;
            position: relative;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: #4caf50;
            width: 0%;
            transition: width .3s;
        }
    </style>
</head>
<body>

<!-- LEFT PANEL -->
<div id="panel">
    <div>
        <div class="panel-label">Amount</div>
        <div class="amount-row">
            <input type="number" id="bet-input" value="1.00" min="0.10" step="0.10">
            <span class="coin-icon">🪙</span>
            <div class="amount-btns">
                <button onclick="adjustBet(0.5)">½</button>
                <button onclick="adjustBet(2)">2×</button>
            </div>
        </div>
    </div>

    <div>
        <div class="panel-label">Difficulty</div>
        <div class="select-wrap">
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
                <option value="daredevil">Daredevil</option>
            </select>
        </div>
    </div>

    <button id="btn-play" onclick="startGame()">Play</button>
    <button id="btn-cashout" onclick="cashOut()">Cash Out</button>

    <div>
        <div class="panel-label">Total Net Gain (1.00×)</div>
        <div class="net-gain-box">
            <span id="net-gain">0.00</span>
            <span class="coin-icon">🪙</span>
        </div>
    </div>
</div>

<!-- GAME AREA -->
<div id="game-area">
    <div id="topbar">
        <span class="topbar-logo">🐔 Chicken Road</span>
        <a class="topbar-back" href="menu.html">← Casino</a>
    </div>
    <div id="progress-bar"><div id="progress-fill"></div></div>

    <div id="road">
        <canvas id="road-bg"></canvas>
        <div id="tiles-row"></div>
        <div id="mult-history"></div>

        <!-- chicken -->
        <div id="chicken">
            <svg class="chicken-svg" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg">
                <!-- body -->
                <ellipse cx="28" cy="34" rx="18" ry="15" fill="#f5c842"/>
                <!-- wing -->
                <ellipse cx="20" cy="36" rx="8" ry="5" fill="#e0b030" transform="rotate(-15 20 36)"/>
                <!-- neck -->
                <rect x="24" y="20" width="8" height="10" rx="4" fill="#f5c842"/>
                <!-- head -->
                <ellipse cx="28" cy="17" rx="10" ry="9" fill="#f5c842"/>
                <!-- comb -->
                <path d="M24 9 Q26 4 28 8 Q30 2 32 8 Q34 4 36 8" stroke="#e03030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <!-- beak -->
                <polygon points="36,17 42,15 36,20" fill="#e08020"/>
                <!-- eye -->
                <circle cx="32" cy="14" r="2.5" fill="#1a1a2a"/>
                <circle cx="33" cy="13" r="1" fill="white"/>
                <!-- wattle -->
                <ellipse cx="37" cy="21" rx="3" ry="2" fill="#e03030"/>
                <!-- legs -->
                <line x1="22" y1="48" x2="18" y2="54" stroke="#e08020" stroke-width="3" stroke-linecap="round"/>
                <line x1="22" y1="54" x2="15" y2="54" stroke="#e08020" stroke-width="2" stroke-linecap="round"/>
                <line x1="22" y1="54" x2="22" y2="56" stroke="#e08020" stroke-width="2" stroke-linecap="round"/>
                <line x1="32" y1="48" x2="36" y2="54" stroke="#e08020" stroke-width="3" stroke-linecap="round"/>
                <line x1="36" y1="54" x2="43" y2="54" stroke="#e08020" stroke-width="2" stroke-linecap="round"/>
                <line x1="36" y1="54" x2="36" y2="56" stroke="#e08020" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>

        <div id="msg">
            <div class="msg-main" id="msg-main"></div>
            <div class="msg-sub" id="msg-sub"></div>
        </div>
    </div>

    <div id="ground">
        <div class="ground-line"></div>
    </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const LANES = 8;
const DIFFICULTY = {
    easy:       { dangerChance: 0.20, multStep: 0.18 },
    medium:     { dangerChance: 0.35, multStep: 0.30 },
    hard:       { dangerChance: 0.50, multStep: 0.55 },
    daredevil:  { dangerChance: 0.65, multStep: 0.90 },
};

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
    playing: false,
    currentLane: -1,   // -1 = not started, 0..LANES-1
    multiplier: 1.00,
    bet: 1.00,
    balance: 100.00,
    dangerMap: [],      // true = danger, false = safe
    revealed: [],       // which lanes revealed
};

// ── DOM ──────────────────────────────────────────────────────────────────────
const tilesRow   = document.getElementById('tiles-row');
const chicken    = document.getElementById('chicken');
const msgEl      = document.getElementById('msg');
const msgMain    = document.getElementById('msg-main');
const msgSub     = document.getElementById('msg-sub');
const netGainEl  = document.getElementById('net-gain');
const btnPlay    = document.getElementById('btn-play');
const btnCashout = document.getElementById('btn-cashout');
const betInput   = document.getElementById('bet-input');
const histEl     = document.getElementById('mult-history');
const progFill   = document.getElementById('progress-fill');

// ── INIT ─────────────────────────────────────────────────────────────────────
function buildBoard() {
    tilesRow.innerHTML = '';
    const diff = DIFFICULTY[document.getElementById('difficulty').value];

    state.dangerMap = [];
    state.revealed  = [];

    for (let i = 0; i < LANES; i++) {
        const isDanger = Math.random() < diff.dangerChance;
        state.dangerMap.push(isDanger);
        state.revealed.push(false);

        const mult = (1 + diff.multStep * (i + 1)).toFixed(2);

        const lane = document.createElement('div');
        lane.className = 'lane';
        lane.dataset.index = i;
        lane.innerHTML = `
            <div class="pot">
                <div class="steam"><span></span><span></span><span></span></div>
                <div class="flame">🔥</div>
                <div class="pot-handle-l"></div>
                <div class="pot-handle-r"></div>
                <div class="pot-body"></div>
                <div class="pot-lid"><div class="pot-knob"></div></div>
            </div>
            <div class="mult-label">${mult}×</div>
        `;
        lane.querySelector('.pot').addEventListener('click', () => onLaneClick(i));
        tilesRow.appendChild(lane);
    }
}

// position chicken at a lane or at start
function positionChicken(laneIndex) {
    const road = document.getElementById('road');
    const roadW = road.offsetWidth;
    const roadH = road.offsetHeight;
    const laneW = roadW / LANES;

    let left;
    if (laneIndex < 0) {
        left = laneW * 0.3 - 28;  // before first lane
    } else {
        left = laneW * laneIndex + laneW / 2 - 28;
    }

    const bottom = 32 + 10; // ground height + gap
    chicken.style.bottom = (bottom) + 'px';
    chicken.style.left   = left + 'px';
}

function updateNetGain() {
    if (!state.playing) {
        netGainEl.textContent = '0.00';
        return;
    }
    const gain = (state.bet * state.multiplier - state.bet).toFixed(2);
    netGainEl.textContent = gain >= 0 ? '+' + gain : gain;
    // update progress bar
    const pct = Math.min(((state.multiplier - 1) / 5) * 100, 100);
    progFill.style.width = pct + '%';
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
function startGame() {
    const bet = parseFloat(betInput.value);
    if (isNaN(bet) || bet < 0.10) return;
    state.bet        = bet;
    state.playing    = true;
    state.currentLane = -1;
    state.multiplier  = 1.00;

    buildBoard();
    hideMessage();
    positionChicken(-1);
    chicken.style.display = 'block';

    btnPlay.style.display    = 'none';
    btnCashout.style.display = 'block';
    betInput.disabled        = true;
    document.getElementById('difficulty').disabled = true;

    progFill.style.width = '0%';
    updateNetGain();
}

function onLaneClick(index) {
    if (!state.playing) return;
    if (index !== state.currentLane + 1) return; // must go next only
    if (state.revealed[index]) return;

    state.revealed[index] = true;
    const lane = tilesRow.children[index];
    const diff = DIFFICULTY[document.getElementById('difficulty').value];

    // move chicken
    state.currentLane = index;
    positionChicken(index);
    chicken.classList.remove('walking');
    void chicken.offsetWidth;
    chicken.classList.add('walking');

    if (state.dangerMap[index]) {
        // DANGER
        lane.classList.add('revealed-danger');
        chicken.classList.remove('walking');
        chicken.classList.add('squish');
        setTimeout(() => { chicken.style.display = 'none'; }, 400);
        endGame(false);
    } else {
        // SAFE
        lane.classList.add('revealed-safe');
        state.multiplier = parseFloat((1 + diff.multStep * (index + 1)).toFixed(2));
        updateNetGain();

        // if last lane reached, auto cash out
        if (index === LANES - 1) {
            setTimeout(() => cashOut(), 500);
        }
    }
}

function cashOut() {
    if (!state.playing) return;
    if (state.currentLane < 0) {
        // never moved
        resetPanel();
        return;
    }
    const winnings = (state.bet * state.multiplier).toFixed(2);
    showMessage(`+${winnings} 🪙`, `Cashed out at ${state.multiplier}×`, '#4caf50');
    addHistory(state.multiplier, true);
    state.playing = false;
    resetPanel();
    revealAll();
}

function endGame(won) {
    state.playing = false;
    if (!won) {
        showMessage('💥 Busted!', `Lost ${state.bet.toFixed(2)} 🪙`, '#e05030');
        addHistory(state.multiplier, false);
        revealAll();
    }
    resetPanel();
}

function resetPanel() {
    btnPlay.style.display    = 'block';
    btnCashout.style.display = 'none';
    betInput.disabled        = false;
    document.getElementById('difficulty').disabled = false;
    updateNetGain();
}

function revealAll() {
    for (let i = 0; i < LANES; i++) {
        if (!state.revealed[i]) {
            const lane = tilesRow.children[i];
            if (state.dangerMap[i]) {
                lane.classList.add('revealed-danger');
            }
        }
    }
}

// ── MESSAGES ─────────────────────────────────────────────────────────────────
function showMessage(main, sub, color) {
    msgMain.textContent = main;
    msgMain.style.color = color;
    msgSub.textContent  = sub;
    msgEl.classList.add('show');
    setTimeout(() => msgEl.classList.remove('show'), 2800);
}

function hideMessage() {
    msgEl.classList.remove('show');
}

// ── HISTORY ──────────────────────────────────────────────────────────────────
function addHistory(mult, win) {
    const badge = document.createElement('div');
    badge.className = 'hist-badge ' + (win ? 'win' : 'loss');
    badge.textContent = mult.toFixed(2) + '×';
    histEl.prepend(badge);
    if (histEl.children.length > 6) histEl.removeChild(histEl.lastChild);
}

// ── BET CONTROLS ─────────────────────────────────────────────────────────────
function adjustBet(factor) {
    let v = parseFloat(betInput.value) || 1;
    v = Math.max(0.10, parseFloat((v * factor).toFixed(2)));
    betInput.value = v.toFixed(2);
}

// ── DRAW ROAD BACKGROUND ─────────────────────────────────────────────────────
function drawRoadBg() {
    const canvas = document.getElementById('road-bg');
    const road   = document.getElementById('road');
    canvas.width  = road.offsetWidth;
    canvas.height = road.offsetHeight;
    const ctx = canvas.getContext('2d');

    // dark asphalt lanes
    const laneW = canvas.width / LANES;
    for (let i = 0; i < LANES; i++) {
        ctx.fillStyle = i % 2 === 0 ? '#141f2a' : '#111a24';
        ctx.fillRect(i * laneW, 0, laneW, canvas.height);
    }

    // lane dividers
    ctx.strokeStyle = '#1e2d3a';
    ctx.lineWidth = 1;
    for (let i = 1; i < LANES; i++) {
        ctx.beginPath();
        ctx.setLineDash([14, 12]);
        ctx.moveTo(i * laneW, 0);
        ctx.lineTo(i * laneW, canvas.height);
        ctx.stroke();
    }
}

// ── STARTUP ───────────────────────────────────────────────────────────────────
buildBoard();
drawRoadBg();
chicken.style.display = 'none';
window.addEventListener('resize', () => {
    drawRoadBg();
    if (state.playing) positionChicken(state.currentLane);
});
</script>
