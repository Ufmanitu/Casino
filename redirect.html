<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Loading Game...</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle, #12002b, #000);
        display: flex;
        justify-content: center;
        align-items: center;
        color: gold;
        font-family: Arial, sans-serif;
        flex-direction: column;
    }

    .spinner {
        width: 80px;
        height: 80px;
        border: 6px solid rgba(255,255,255,0.1);
        border-top: 6px solid #ff00cc;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 25px #ff00cc;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .text {
        margin-top: 20px;
        letter-spacing: 2px;
    }
</style>
</head>
<body>

<div class="spinner"></div>
<div class="text">Checking game...</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    if (!game) {
        window.location.href = "under_construction.html";
    }

    const gameFile = `${game}.html`;

    fetch(gameFile, { method: "HEAD" })
        .then(res => {
            if (res.ok) {
                setTimeout(() => {
                    window.location.href = gameFile;
                }, 800);
            } else {
                window.location.href = "under_construction.html";
            }
        })
        .catch(() => {
            window.location.href = "under_construction.html";
        });
</script>

</body>
</html>
